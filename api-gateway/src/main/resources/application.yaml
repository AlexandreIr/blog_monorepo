server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
        - id: blog-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
          filters:
            - name: RequestRateLimiter
              args:

                redis-rate-limiter.replenishRate: 5

                redis-rate-limiter.burstCapacity: 10

                key-resolver: "#{@ipKeyResolver}"