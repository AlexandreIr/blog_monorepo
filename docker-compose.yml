version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin.4321
      POSTGRES_DB: blog_db
    ports:
      - "5432:5432"
    networks:
      - blog-network

  redis:
    image: redis:7-alpine 
    container_name: blog-redis
    ports:
      - "6379:6379"
    networks:
      - blog-network

  blog-api:
    build: ./blog_libertad 
    container_name: blog-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/blog_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin.4321
    depends_on:
      - postgres 
    networks:
      - blog-network 

  api-gateway:
    build: ./api-gateway 
    container_name: blog-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://blog-api:8081
    depends_on:
      - redis
      - blog-api
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge