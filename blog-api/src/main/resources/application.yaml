spring:
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  spring:
    servlet:
      multipart:
        enabled: true
        max-file-size: 20MB
        max-request-size: 25MB
        file-size-threshold: 0B

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

Cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}


jwt:
  secret: ${JWT_SECRET}
  expiration: 43200000
server:
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024
  port: 8081

app:
  frontend-url: ${FRONTEND_URL}
  budget:
    recipient: ${BUDGET_RECIPIENT_EMAIL}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: blog-api

logging:
  level:
    root: INFO
    br.com.libertadfacilities.blog: DEBUG

