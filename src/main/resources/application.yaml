  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb # In-memory database named 'testdb'
    driver-class-name: org.h2.Driver
    username: sa # Default H2 username
    password: password # Default H2 password (can be left blank)
  jpa:
    hibernate:
      ddl-auto: update # Automatically updates the database schema
    show-sql: true # Log SQL statements to the console


